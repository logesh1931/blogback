services:
  - type: web
    name: inkwell-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inkwell-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # ← update this

databases:
  - name: inkwell-db
    databaseName: inkwell
    user: inkwell
    plan: free
